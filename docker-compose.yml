version: '3'

services:
  ollama:
    build:
      context: .
      dockerfile: Dockerfile.ollama-gpu
    image: synthesisai/dataset-generator-ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - OLLAMA_USE_GPU=1
      - OLLAMA_HOST=0.0.0.0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu, utility, compute]
    volumes:
      - ollama_models:/root/.ollama
      - ./scripts/ollama-entrypoint.sh:/ollama-entrypoint.sh
    entrypoint: ["bash", "/ollama-entrypoint.sh"]
    restart: unless-stopped
    networks:
      - dataset_gen_net

  synthetic-data-service:
    build:
      context: .
      dockerfile: Dockerfile.service
    image: synthesisai/dataset-generator:latest
    container_name: synthetic-data-service
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./config:/app/config
      - ./templates:/app/templates
      - ./user_configs:/app/user_configs
      - ./data:/app/data
      - ./output_datasets:/app/output_datasets
      - ./logs:/app/logs
    depends_on:
      - ollama
    restart: unless-stopped
    networks:
      - dataset_gen_net

volumes:
  ollama_models:

networks:
  dataset_gen_net:
    driver: bridge