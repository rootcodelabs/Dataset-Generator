# Bedrock Anthropic provider configuration (when provider.name = "bedrock-anthropic")
bedrock_anthropic:
  model_name: "eu.anthropic.claude-3-7-sonnet-20250219-v1:0"
  aws_region: "eu-west-1"
  temperature: 0.7
  max_tokens: 4096
  top_p: 1.0
  tpm_limit: 200000
  stop_sequences: []
  batch_generation:
    enabled: true
    max_batch_size: 10
    max_tokens_per_batch: 20000

# Azure OpenAI provider configuration (when provider.name = "azure-openai")
azure_openai:
  # Required: Set via environment variables AZURE_OPENAI_ENDPOINT, AZURE_OPENAI_API_KEY, AZURE_OPENAI_DEPLOYMENT_NAME
  api_version: "2024-12-01-preview"
  model_name: "gpt-4o"
  temperature: 0.7
  max_tokens: 4096
  top_p: 1.0
  tpm_limit: 200000
  rpm_limit: 6000
  batch_generation:
    enabled: true
    max_batch_size: 10
    max_tokens_per_batch: 20000

# Ollama provider configuration (when provider.name = "ollama")
ollama:
  model_name: "gemma3:1b-it-qat"
  host: "http://ollama:11434"
  timeout: 60
  max_retries: 3
  retry_delay: 5
  batch_generation:
    enabled: false

# MAIN PROVIDER SELECTION - THIS IS THE KEY SETTING
provider:
  name: "ollama"  # THIS DETERMINES WHICH PROVIDER TO USE
  timeout: 60
  max_retries: 3
  retry_delay: 5

# Processing settings
processing:
  wait_between_requests: 1
  timeout_seconds: 1300  # 1 hour timeout for dataset processing
  max_consecutive_failures: 3
  success_rate_threshold: 0.8  # 80% success rate required
  retry_on_failure: true

# Callback configuration for external project notifications
callback:
  url: ""  # Set via environment variable CALLBACK_URL
  timeout: 60.0  # Callback timeout in seconds
  retries: 3  # Number of retry attempts
  retry_backoff: true  # Use exponential backoff
  include_error_details: true
  include_summary: true

# Batch generation settings (global)
batch_generation:
  enabled: true
  max_batch_size: 10
  fallback_on_failure: true

# API connection settings
api:
  url: "http://localhost:8000"
  timeout_seconds: 30

# Directory paths
directories:
  input: "data"
  output: "output_datasets"
  templates: "templates"
  user_configs: "user_configs"

# Default generation settings
generation:
  default_num_examples: 10
  default_language: "et"
  max_retries: 3
  parameters:
    temperature: 0.7
    max_tokens: 4096

# Language and Prompt Settings  
language_settings:
  default_system_prompt: "You are a helpful assistant providing accurate information based on topic content."
  default_language: "et"
  supported_languages:
    en: "English"
    et: "Estonian"
    fi: "Finnish"

# Storage configuration
storage:
  datasets_dir: "datasets"
  templates_dir: "templates"
  user_configs_dir: "user_configs"

# Default Output Settings
output_defaults:
  save_format: "json"
  supported_formats:
    - "json"
    - "text"

# Dataset generation configuration
dataset_generation:
  structure_name: "single_question"
  prompt_template_name: "institute_topic_question"
  traversal_strategy: "pattern"
  output_format: "json"
  num_samples: 10
  post_processing: "aggregation"
  aggregation:
    output_filename: "12"
    output_format: "csv"
    merge_strategy: "combine_arrays"
    include_metadata: true
    enable_shuffling: false
    field_mapping:
      enabled: true
      payload_to_output:
        agency_name: agency_name
        agency_id: agency_id
      defaults:
        item_id: auto_increment
        dataset_version_id: version_id
      content_fields:
        question: data_item
    csv_field_order:
      - item_id
      - agency_name
      - agency_id
      - data_item
      - dataset_version_id
  parameters:
    language: "et"
    temperature: 0.7
    redundancy_factor: 1.5
    language_name: "Estonian"
    difficulty: "medium"
    style: "clear and concise"
    system_prompt: "You are a helpful assistant for generating synthetic questions for given contexts."
  filter: {}

# MLflow tracking
mlflow:
  experiment_name: "synthetic_data_generation"

# Data source configuration
data_sources:
  default:
    strategy: "pattern"
    base_path: "data"
    patterns: ["**/cleaned.txt"]
    recursive: true

# Relevance Score Analysis
relevance_score:
  enabled: true
  embedding_model: "paraphrase-multilingual-mpnet-base-v2"
  segment_weight: 0.6
  query_weight: 0.3
  term_weight: 0.1
  threshold_good: 0.7
  threshold_acceptable: 0.5
  min_df: 1
  max_df: 0.9
  ngram_range: "(1, 2)"

# Information Coverage Analysis
information_coverage:
  enabled: true
  similarity_threshold: 0.5

# Model settings
models:
  embedding_model: "paraphrase-multilingual-mpnet-base-v2"
  qualitative_model: "google/gemma-2-2b-it"
  use_4bit_quantization: true